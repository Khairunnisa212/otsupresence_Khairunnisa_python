version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: otsupresence_db
      MYSQL_ROOT_PASSWORD: otsuka2024
      MYSQL_USER: otsupresence
      MYSQL_PASSWORD: otsuka2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-potsuka2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_demo_data &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  media_files:
