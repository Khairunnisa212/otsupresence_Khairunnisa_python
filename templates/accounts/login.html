<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#003087">
<title>OtsuPresence — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] } } }
}
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>
<body class="min-h-screen flex flex-col" style="background:linear-gradient(160deg,#003087 0%,#004BB4 50%,#0066CC 100%)">

  <!-- top brand section -->
  <div class="px-7 pt-16 pb-8 relative z-10">
    <div class="w-14 h-14 rounded-2xl bg-white/15 backdrop-blur flex items-center justify-center mb-5">
      <svg class="w-8 h-8 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z"/></svg>
    </div>
    <h1 class="text-4xl font-black text-white tracking-tight leading-none">OtsuPresence</h1>
    <p class="text-white/60 text-sm font-semibold mt-1">PT Otsuka Indonesia</p>
    <p class="text-white/75 text-base font-medium mt-4 leading-relaxed">
      Sistem absensi berbasis foto selfie<br>& GPS location tracking.
    </p>
  </div>

  <!-- login sheet -->
  <div class="mt-auto bg-white rounded-t-3xl px-6 pt-7 pb-10 shadow-2xl relative z-10">
    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Masuk ke Akun</h2>
    <p class="text-gray-400 text-sm mt-1 mb-6">Gunakan kredensial yang diberikan HR</p>

    {% if form.non_field_errors %}
    <div class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm font-semibold rounded-xl px-4 py-3 mb-4">
      <svg class="w-5 h-5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
      Username atau password salah.
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <!-- username -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
        <div class="flex items-center bg-gray-100 rounded-2xl border-2 border-transparent focus-within:border-blue-600 focus-within:bg-white transition-all">
          <div class="pl-4 pr-2 text-gray-400">
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
          </div>
          <input type="text" name="username" autofocus autocomplete="username"
                 value="{{ form.username.value|default:'' }}"
                 placeholder="Masukkan username"
                 class="flex-1 bg-transparent py-4 pr-4 text-base text-gray-900 outline-none placeholder-gray-400 font-medium">
        </div>
      </div>

      <!-- password -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
        <div class="flex items-center bg-gray-100 rounded-2xl border-2 border-transparent focus-within:border-blue-600 focus-within:bg-white transition-all">
          <div class="pl-4 pr-2 text-gray-400">
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
          </div>
          <input type="password" id="passInput" name="password" autocomplete="current-password"
                 placeholder="Masukkan password"
                 class="flex-1 bg-transparent py-4 text-base text-gray-900 outline-none placeholder-gray-400 font-medium">
          <button type="button" onclick="togglePass()" class="pr-4 pl-2 text-gray-400 hover:text-gray-600 transition-colors">
            <svg id="eyeOn" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
            <svg id="eyeOff" class="w-5 h-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
          </button>
        </div>
      </div>

      <button type="submit"
              class="w-full flex items-center justify-center gap-2 bg-blue-700 hover:bg-blue-800 active:scale-[.98] text-white font-extrabold text-base py-4 rounded-2xl transition-all shadow-lg shadow-blue-700/30 mt-2">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
        Masuk
      </button>
    </form>

    <p class="text-center text-gray-400 text-xs mt-6">Hubungi HR jika lupa password</p>
  </div>
</body>
<script>
function togglePass() {
  const i = document.getElementById('passInput');
  const on = document.getElementById('eyeOn');
  const off = document.getElementById('eyeOff');
  if (i.type === 'password') { i.type = 'text'; on.classList.add('hidden'); off.classList.remove('hidden'); }
  else { i.type = 'password'; on.classList.remove('hidden'); off.classList.add('hidden'); }
}
</script>
</html>
